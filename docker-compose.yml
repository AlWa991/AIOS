services:
  postgres:
    # postgres:16 + pgvector (migration reserves the vector column, ADR-0011)
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aios
      POSTGRES_PASSWORD: aios
      POSTGRES_DB: aios
    ports:
      - "54322:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aios -d aios"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://aios:aios@postgres:5432/aios
      PORT: "3000"
      # spec-0003: real email adapter reads the baked-in sample .eml set
      AIOS_EMAIL_EML_DIR: /app/fixtures/sample-emails
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then((r) => process.exit(r.ok ? 0 : 1), () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
